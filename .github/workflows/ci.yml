name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: true
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust (fmt + clippy + test + audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: rust-

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Security audit
        run: |
          cargo install cargo-audit --locked || true
          cargo audit

  typescript:
    name: TypeScript (lint + type-check + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install pnpm
        run: npm install -g pnpm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run turbo pipeline
        run: pnpm run build

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [rust]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vaultpass
          POSTGRES_PASSWORD: password
          POSTGRES_DB: vaultpass_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-integration-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: rust-

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://vaultpass:password@localhost:5432/vaultpass_platform
        run: |
          for migration in $(find migrations -maxdepth 1 -type f -name '*.sql' | sort); do
            psql "$DATABASE_URL" -f "$migration"
          done

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://vaultpass:password@localhost:5432/vaultpass_platform
          REDIS_URL: redis://localhost:6379/0
        run: cargo test --workspace

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
